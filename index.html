<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Dashboard</title>

    <!--
        Lightweight Charts — librería open-source de TradingView (MIT License)
        https://github.com/tradingview/lightweight-charts
        Esto reemplaza los widgets embebidos que tenían 15 min de delay.
        El delay era una restricción de licencia de las bolsas al redistribuir
        datos, no un límite técnico de la librería de charting.
    -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        :root {
            --bg:      #0d1117;
            --card:    #161b22;
            --card2:   #1c2128;
            --border:  #30363d;
            --txt:     #e6edf3;
            --muted:   #8b949e;
            --green:   #3fb950;
            --red:     #f85149;
            --yellow:  #d29922;
            --blue:    #58a6ff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────────── */
        header {
            padding: 13px 28px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky; top: 0; z-index: 200;
        }
        header h1 { font-size: 17px; font-weight: 700; }
        .live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(63,185,80,.5); }
            50%      { opacity:.6; box-shadow:0 0 0 5px rgba(63,185,80,0); }
        }
        #ws-status { font-size: 10px; color: var(--muted); }
        #utc-clock { margin-left:auto; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }

        /* ── Page container ─────────────────────── */
        .container { padding: 24px 28px; max-width: 1800px; margin: 0 auto; }

        /* ── Section title ──────────────────────── */
        .sec-title {
            font-size: 14px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .8px; color: var(--muted);
            margin-bottom: 14px;
        }

        /* ══════════════════════════════════════════
           MARKETS — 3 cols, chart + timer inline
           ══════════════════════════════════════════ */
        .markets-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 36px;
        }

        .mcard {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .mcard-head {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .mname { display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px; }
        .flag  { font-size:18px; line-height:1; }

        .mcard-body {
            display: flex;
            flex: 1;
            min-height: 260px;
        }

        .mchart {
            flex: 1 1 0;
            min-width: 0;
            position: relative;
            border-right: 1px solid var(--border);
        }

        /* Contenedor absoluto para Lightweight Charts */
        .mchart-inner {
            position: absolute;
            inset: 0;
        }

        /* Etiqueta sutil que indica el ETF usado como proxy */
        .proxy-tag {
            position: absolute;
            bottom: 6px; left: 8px;
            font-size: 9px; font-weight: 600;
            color: var(--muted); opacity: .5;
            z-index: 10; pointer-events: none;
            text-transform: uppercase; letter-spacing: .5px;
        }

        .chart-loading {
            position: absolute;
            inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: var(--muted);
            background: var(--card);
            z-index: 8;
        }

        .mtimer {
            flex: 0 0 190px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 18px 18px 18px 20px;
            gap: 14px;
            background: var(--card2);
        }

        .badge {
            padding: 3px 11px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: .5px;
        }
        .b-open   { background:rgba(63,185,80,.15);  color:var(--green);  border:1px solid rgba(63,185,80,.35); }
        .b-closed { background:rgba(248,81,73,.15);  color:var(--red);    border:1px solid rgba(248,81,73,.35); }
        .b-lunch  { background:rgba(210,153,34,.15); color:var(--yellow); border:1px solid rgba(210,153,34,.35); }

        .tlabel  { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:2px; }
        .tclock  { font-size:26px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:2px; }
        .t-open  { color:var(--green); }
        .t-closed{ color:var(--red); }
        .t-lunch { color:var(--yellow); }

        .tlocal  { font-size:11px; color:var(--muted); }
        .tlocal span { display:block; font-size:15px; font-weight:600; color:var(--txt); font-variant-numeric:tabular-nums; }

        /* ══════════════════════════════════════════
           WATCHLIST — chips + gráfico grande
           ══════════════════════════════════════════ */
        .watchlist-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .chips-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-wrap: wrap;
        }
        .chips-bar::-webkit-scrollbar { height:4px; }
        .chips-bar::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

        .chip {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card2);
            cursor: pointer;
            transition: all .18s;
            white-space: nowrap;
            user-select: none;
        }
        .chip:hover  { border-color: var(--blue); background: rgba(88,166,255,.07); }
        .chip.active { border-color: var(--blue); background: rgba(88,166,255,.12); }

        .chip-icon { font-size: 18px; line-height: 1; }
        .chip-info { display: flex; flex-direction: column; gap: 1px; }
        .chip-name { font-size: 13px; font-weight: 700; }
        .chip-sub  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }

        .chip { border-left-width: 3px; }
        .chip-gold  { border-left-color: #f7b731; }
        .chip-oil   { border-left-color: #a55c1b; }
        .chip-btc   { border-left-color: #f7921a; }
        .chip-nvda  { border-left-color: #76e85a; }
        .chip-tsm   { border-left-color: #29b6f6; }
        .chip-tsla  { border-left-color: #e84142; }

        .chip-gold.active  { background: rgba(247,183,49,.1);  border-color:#f7b731; }
        .chip-oil.active   { background: rgba(165,92,27,.15);  border-color:#a55c1b; }
        .chip-btc.active   { background: rgba(247,146,26,.1);  border-color:#f7921a; }
        .chip-nvda.active  { background: rgba(118,232,90,.08); border-color:#76e85a; }
        .chip-tsm.active   { background: rgba(41,182,246,.1);  border-color:#29b6f6; }
        .chip-tsla.active  { background: rgba(232,65,66,.1);   border-color:#e84142; }

        #wl-chart-box {
            height: 500px;
            position: relative;
        }
        #wl-chart-inner {
            position: absolute;
            inset: 0;
        }
    </style>
</head>
<body>

<header>
    <div class="live-dot"></div>
    <h1>Market Dashboard</h1>
    <span id="ws-status">conectando…</span>
    <span id="utc-clock">UTC  --:--:--</span>
</header>

<div class="container">

    <!-- ══ MARKETS ══════════════════════════════════════════════════ -->
    <div class="sec-title">Mercados</div>
    <div class="markets-grid">

        <!-- JAPAN -->
        <div class="mcard">

                <div class="mname"><span class="flag">🇯🇵</span> Nikkei 225</div>

                <span class="badge b-closed" id="uk-badge">...</span>
            </div>
            <div class="mcard-body">
                <div class="mchart">
                    <div class="mchart-inner" id="chart-uk"></div>
                    <div class="chart-loading"  id="load-uk">Cargando…</div>
                    <div class="proxy-tag">EWU proxy</div>

                    <div>
                        <div class="tlabel" id="uk-label">Cargando…</div>

                    <div class="chart-loading"  id="load-us">Cargando…</div>

                </div>
                <div class="mtimer">
                    <div>
                        <div class="tlabel" id="us-label">Cargando…</div>
                        <div class="tclock t-closed" id="us-timer">--:--:--</div>

    </div><!-- /markets-grid -->

    <!-- ══ WATCHLIST ════════════════════════════════════════════════ -->
    <div class="sec-title">Watchlist</div>
    <div class="watchlist-wrap">
        <div class="chips-bar" id="chips-bar"></div>
        <div id="wl-chart-box">
            <div id="wl-chart-inner"></div>
        </div>
    </div>

</div><!-- /container -->

<!-- ══════════════════════════════════════════════════════════════════
     JAVASCRIPT
     ══════════════════════════════════════════════════════════════════ -->
<script>
// ═══════════════════════════════════════════════════════════════════════════════
// MARKET DASHBOARD — Real-Time Edition
// Datos:     Finnhub.io (REST + WebSocket), gratuito con API key
// Gráficos:  TradingView Lightweight Charts (open source, MIT)
// ═══════════════════════════════════════════════════════════════════════════════

const TOKEN = 'd7cg5tpr01qv03es8ap0d7cg5tpr01qv03es8apg';

// Helpers básicos
const nowSec  = () => Math.floor(Date.now() / 1000);
const sleep   = ms => new Promise(r => setTimeout(r, ms));

// ── Configuración visual de Lightweight Charts (dark theme) ───────────────────
const CHART_BASE = {
    autoSize: true,                         // llena automáticamente su contenedor
    layout: {
        background: { type: 'solid', color: '#161b22' },
        textColor: '#e6edf3',
    },
    grid: {
        vertLines: { color: '#21262d' },
        horzLines: { color: '#21262d' },
    },
    rightPriceScale: {
        borderColor: '#30363d',
        scaleMargins: { top: 0.1, bottom: 0.1 },
    },
    timeScale: {
        borderColor: '#30363d',
        timeVisible: true,
        secondsVisible: false,
    },
    crosshair: { mode: 1 },                 // 1 = Normal (muestra precio en cursor)
};

// Colores verde/rojo para las velas
const CANDLE_COLORS = {
    upColor:         '#3fb950',
    downColor:       '#f85149',
    borderUpColor:   '#3fb950',
    borderDownColor: '#f85149',
    wickUpColor:     '#3fb950',
    wickDownColor:   '#f85149',
};

// ── Mercados (índices → ETFs como proxy) ──────────────────────────────────────
//
// Problema original: los widgets embebidos de TradingView tienen 15 min de delay
// para datos de bolsas reguladas (NYSE, LSE, TSE) porque las bolsas cobran por
// redistribuir datos en tiempo real.
//
// Solución: usamos ETFs americanos listados en NYSE Arca como proxies.
// Estos ETFs replican el índice con correlación >99% y sus datos están
// disponibles en tiempo real vía Finnhub sin costo de licencia de bolsa.
//   • EWJ  → iShares MSCI Japan ETF      (≈ Nikkei 225)
//   • EWU  → iShares MSCI United Kingdom (≈ FTSE 100)
//   • SPY  → SPDR S&P 500 ETF            (≈ S&P 500 exacto)
//
// Nota: los precios nominales de los ETFs son distintos a los índices
// (EWJ ≈ $60, no 35.000), pero los movimientos porcentuales son idénticos.

const MARKETS = [
    {
        id: 'jp', flag: '🇯🇵', name: 'Nikkei 225',
        sym: 'EWJ',
        tz: 'Asia/Tokyo', city: 'Tokio',
        sessions: [
            { open: 9*60,     close: 11*60+30 },   // 09:00–11:30
            { open: 12*60+30, close: 15*60+30 },   // 12:30–15:30
        ],
    },
    {
        id: 'uk', flag: '🇬🇧', name: 'FTSE 100',
        sym: 'EWU',
        tz: 'Europe/London', city: 'Londres',
        sessions: [{ open: 8*60, close: 16*60+30 }],
    },
    {
        id: 'us', flag: '🇺🇸', name: 'S&P 500',
        sym: 'SPY',
        tz: 'America/New_York', city: 'Nueva York',
        sessions: [{ open: 9*60+30, close: 16*60 }],
    },
];

// ── Activos del watchlist ─────────────────────────────────────────────────────
// apiType determina qué endpoint de Finnhub usar para las velas históricas:
//   'stock'  → /stock/candle   (acciones y ETFs)
//   'crypto' → /crypto/candle  (criptomonedas)
//   'forex'  → /forex/candle   (divisas, metales spot)

const ASSETS = [
    { id:'gold', sym:'GLD',             apiType:'stock',  name:'Oro',         sub:'GLD · SPDR Gold',  icon:'🥇', cls:'chip-gold' },
    { id:'oil',  sym:'USO',             apiType:'stock',  name:'Petróleo',    sub:'USO · ETF WTI',    icon:'🛢️', cls:'chip-oil'  },
    { id:'btc',  sym:'BINANCE:BTCUSDT', apiType:'crypto', name:'Bitcoin',     sub:'Crypto · Binance', icon:'₿',  cls:'chip-btc'  },
    { id:'nvda', sym:'NVDA',            apiType:'stock',  name:'NVIDIA',      sub:'Nasdaq',           icon:'🟢', cls:'chip-nvda' },
    { id:'tsm',  sym:'TSM',             apiType:'stock',  name:'Taiwan Semi', sub:'NYSE · TSM',       icon:'🔵', cls:'chip-tsm'  },
    { id:'tsla', sym:'TSLA',            apiType:'stock',  name:'Tesla',       sub:'Nasdaq',           icon:'⚡', cls:'chip-tsla' },
];

// ═══════════════════════════════════════════════════════════════════════════════
// CAPA DE DATOS — Finnhub REST
// ═══════════════════════════════════════════════════════════════════════════════
//
// Finnhub devuelve velas con arrays paralelos:
//   t[] → timestamps Unix (segundos) · o[], h[], l[], c[] · v[]
//
// Lightweight Charts espera objetos { time, open, high, low, close }
// donde time también es Unix segundos. La conversión es directa.
//
// Rate limit plan gratuito: 60 llamadas/minuto → escalonamos con sleep(400ms).

async function fetchCandles(sym, apiType, resolution, fromTs, toTs) {
    const ep = apiType === 'crypto' ? 'crypto/candle'
             : apiType === 'forex'  ? 'forex/candle'
             :                        'stock/candle';

    const url = `https://finnhub.io/api/v1/${ep}`
              + `?symbol=${encodeURIComponent(sym)}`
              + `&resolution=${resolution}`
              + `&from=${fromTs}&to=${toTs}`
              + `&token=${TOKEN}`;
    try {
        const resp = await fetch(url);
        const d    = await resp.json();
        if (d.s !== 'ok') return [];
        return d.t.map((t, i) => ({ time: t, open: d.o[i], high: d.h[i], low: d.l[i], close: d.c[i] }));
    } catch (e) {
        console.error(`[API] ${sym}:`, e.message);
        return [];
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
// CAPA DE GRÁFICOS — Lightweight Charts
// ═══════════════════════════════════════════════════════════════════════════════

// Estado de los mini charts de mercado: { jp: {chart, series, lastBar}, … }
const mktState = {};

// Estado del gráfico grande del watchlist
let wlChart = null, wlSeries = null, wlLastBar = null;

// Crea un gráfico con el tema oscuro. extraOpts sobreescribe CHART_BASE.
function makeChart(container, extraOpts = {}) {
    const opts = {
        ...CHART_BASE,
        ...extraOpts,
        timeScale: { ...CHART_BASE.timeScale, ...(extraOpts.timeScale || {}) },
    };
    return LightweightCharts.createChart(container, opts);
}

// Carga el mini chart de un mercado (velas de 30 min, últimos 7 días)
async function loadMarketChart(mkt) {
    const container = document.getElementById(`chart-${mkt.id}`);
    if (!container) return;

    // Mini chart: ocultamos el eje de tiempo para ahorrar espacio
    const chart  = makeChart(container, { timeScale: { visible: false } });
    const series = chart.addCandlestickSeries(CANDLE_COLORS);

    const from    = nowSec() - 7 * 86400;
    const candles = await fetchCandles(mkt.sym, 'stock', 30, from, nowSec());

    if (candles.length) {
        series.setData(candles);
        chart.timeScale().fitContent();
        document.getElementById(`load-${mkt.id}`)?.remove();
    } else {
        const el = document.getElementById(`load-${mkt.id}`);
        if (el) el.textContent = 'Sin datos';
    }

    mktState[mkt.id] = {
        chart,
        series,
        lastBar: candles.length ? candles[candles.length - 1] : null,
    };
}

// Inicializa el gráfico grande del watchlist (sin datos, se cargan después)
function initWatchlistChart() {
    const container = document.getElementById('wl-chart-inner');
    wlChart  = makeChart(container);
    wlSeries = wlChart.addCandlestickSeries(CANDLE_COLORS);
}

// Carga datos históricos en el gráfico del watchlist (velas diarias, 1 año)
async function loadWatchlistData(asset) {
    const candles = await fetchCandles(
        asset.sym, asset.apiType, 'D',
        nowSec() - 365 * 86400, nowSec()
    );
    if (!wlSeries || !candles.length) return;

    wlSeries.setData(candles);
    wlChart.timeScale().fitContent();
    wlLastBar = candles[candles.length - 1];
}

// ═══════════════════════════════════════════════════════════════════════════════
// REAL-TIME — Finnhub WebSocket
// ═══════════════════════════════════════════════════════════════════════════════
//
// ¿Cómo funciona el tick aggregation?
// -------------------------------------------------
// El WebSocket entrega "trades" individuales: cada transacción tiene un precio
// puntual y un timestamp en ms. Para actualizar una vela de 30 minutos:
//
//   1. Calcular a qué barra pertenece: floor(timestamp / (30 * 60 000)) * 30*60
//   2. Si la barra ya existe (misma barTime) → actualizar solo H, L, C
//   3. Si es un período nuevo → crear nueva barra con O=H=L=C=precio
//
// series.update(bar) es muy eficiente: solo re-renderiza la última vela,
// no el gráfico completo. Por eso no hay parpadeo ni caída de rendimiento.

let ws       = null;
const wsSubs = new Set();   // símbolos activos en el WebSocket

function wsConnect() {
    ws = new WebSocket(`wss://ws.finnhub.io?token=${TOKEN}`);

    ws.onopen = () => {
        document.getElementById('ws-status').textContent = '● live';
        document.getElementById('ws-status').style.color = '#3fb950';
        // Al reconectar, re-suscribir todos los símbolos previos
        wsSubs.forEach(sym => ws.send(JSON.stringify({ type: 'subscribe', symbol: sym })));
    };

    ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.type !== 'trade') return;

        for (const trade of msg.data) {
            // trade = { p: price, s: symbol, t: timestamp_ms, v: volume }

            // ── Actualiza mini charts de mercado
            const mkt = MARKETS.find(m => m.sym === trade.s);
            if (mkt && mktState[mkt.id]?.series) {
                const st = mktState[mkt.id];
                st.lastBar = applyTick(st.series, st.lastBar, trade, 30);
            }

            // ── Actualiza gráfico watchlist (activo seleccionado)
            if (trade.s === wlActiveSym && wlSeries) {
                wlLastBar = applyTick(wlSeries, wlLastBar, trade, 1440);   // 1440 min = 1 día
            }
        }
    };

    ws.onerror = () => {};
    ws.onclose = () => {
        document.getElementById('ws-status').textContent = '○ reconectando…';
        document.getElementById('ws-status').style.color = 'var(--muted)';
        setTimeout(wsConnect, 5000);
    };
}

function wsSubscribe(sym) {
    wsSubs.add(sym);
    if (ws?.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'subscribe', symbol: sym }));
}

function wsUnsubscribe(sym) {
    wsSubs.delete(sym);
    if (ws?.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'unsubscribe', symbol: sym }));
}

// Aplica un tick (precio puntual) a la última vela de la serie.
// intervalMin: duración de la vela en minutos (30 para mini, 1440 para daily)
function applyTick(series, lastBar, trade, intervalMin) {
    const barTime = Math.floor(trade.t / 1000 / (intervalMin * 60)) * (intervalMin * 60);

    if (lastBar && lastBar.time === barTime) {
        const updated = {
            time:  barTime,
            open:  lastBar.open,
            high:  Math.max(lastBar.high, trade.p),
            low:   Math.min(lastBar.low,  trade.p),
            close: trade.p,
        };
        series.update(updated);
        return updated;
    }

    // Nuevo período: crear barra con O=H=L=C=primer_precio
    if (!lastBar || barTime > lastBar.time) {
        const bar = { time: barTime, open: trade.p, high: trade.p, low: trade.p, close: trade.p };
        series.update(bar);
        return bar;
    }

    return lastBar;   // tick más viejo que la última barra → ignorar
}

// ═══════════════════════════════════════════════════════════════════════════════
// WATCHLIST — chips y selección de activo
// ═══════════════════════════════════════════════════════════════════════════════

let activeAssetId = 'gold';
let wlActiveSym   = null;

function buildChips() {
    const bar = document.getElementById('chips-bar');
    for (const a of ASSETS) {
        const btn = document.createElement('button');
        btn.className = `chip ${a.cls}${a.id === activeAssetId ? ' active' : ''}`;
        btn.id = `chip-${a.id}`;
        btn.innerHTML = `
            <span class="chip-icon">${a.icon}</span>
            <span class="chip-info">
                <span class="chip-name">${a.name}</span>
                <span class="chip-sub">${a.sub}</span>
            </span>`;
        btn.addEventListener('click', () => selectAsset(a.id));
        bar.appendChild(btn);
    }
}

async function selectAsset(id) {
    const asset = ASSETS.find(a => a.id === id);
    if (!asset || id === activeAssetId) return;

    document.getElementById(`chip-${activeAssetId}`)?.classList.remove('active');
    activeAssetId = id;
    document.getElementById(`chip-${id}`)?.classList.add('active');

    // Rotar suscripción WebSocket al nuevo símbolo
    if (wlActiveSym) wsUnsubscribe(wlActiveSym);
    wlActiveSym = asset.sym;
    wsSubscribe(wlActiveSym);

    await loadWatchlistData(asset);
}

// ═══════════════════════════════════════════════════════════════════════════════
// MARKET TIMERS
// ═══════════════════════════════════════════════════════════════════════════════
// Sin cambios respecto a la versión original.
// Usa Intl.DateTimeFormat para obtener la hora local del mercado, lo que maneja
// el horario de verano (DST) automáticamente sin calcular offsets UTC a mano.

function clock(tz) {
    const parts = Object.fromEntries(
        new Intl.DateTimeFormat('en-US', {
            timeZone: tz,
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            weekday: 'short', hour12: false,
        }).formatToParts(new Date()).map(p => [p.type, p.value])
    );
    const h = +parts.hour, m = +parts.minute, s = +parts.second;
    return { h, m, s, totalSec: h*3600 + m*60 + s, weekday: parts.weekday };
}

function hms(sec) {
    if (sec < 0) sec = 0;
    return [Math.floor(sec/3600), Math.floor(sec%3600/60), sec%60]
        .map(n => String(n).padStart(2, '0')).join(':');
}

function setMarketState(id, state, sec, label) {
    const map = {
        open:   { bc:'b-open',   tc:'t-open',   bt:'Abierto'  },
        closed: { bc:'b-closed', tc:'t-closed', bt:'Cerrado'  },
        lunch:  { bc:'b-lunch',  tc:'t-lunch',  bt:'Almuerzo' },
    };
    const s = map[state];
    const badge = document.getElementById(`${id}-badge`);
    const timer = document.getElementById(`${id}-timer`);
    const lbl   = document.getElementById(`${id}-label`);
    if (badge) { badge.className = `badge ${s.bc}`; badge.textContent = s.bt; }
    if (timer) { timer.className = `tclock ${s.tc}`; timer.textContent = hms(sec); }
    if (lbl)   { lbl.textContent = label; }
}

function updateMarket(mkt) {
    const t = clock(mkt.tz);
    const local = document.getElementById(`${mkt.id}-local`);
    if (local) local.textContent = [t.h, t.m, t.s].map(n => String(n).padStart(2,'0')).join(':');

    if (t.weekday === 'Sat' || t.weekday === 'Sun') {
        const days = t.weekday === 'Sat' ? 2 : 1;
        const sec  = (86400 - t.totalSec) + (days - 1)*86400 + mkt.sessions[0].open * 60;
        setMarketState(mkt.id, 'closed', sec, 'Abre el Lunes en');
        return;
    }

    if (mkt.sessions.length > 1) {
        const [s1, s2] = mkt.sessions;
        if (t.totalSec >= s1.close*60 && t.totalSec < s2.open*60) {
            setMarketState(mkt.id, 'lunch', s2.open*60 - t.totalSec, 'Almuerzo – reabre en');
            return;
        }
    }

    for (const s of mkt.sessions) {
        if (t.totalSec >= s.open*60 && t.totalSec < s.close*60) {
            setMarketState(mkt.id, 'open', s.close*60 - t.totalSec, 'Cierra en');
            return;
        }
    }

    for (const s of mkt.sessions) {
        if (s.open*60 > t.totalSec) {
            setMarketState(mkt.id, 'closed', s.open*60 - t.totalSec, 'Abre en');
            return;
        }
    }

    setMarketState(mkt.id, 'closed', (86400 - t.totalSec) + mkt.sessions[0].open*60, 'Abre mañana en');
}

function tick() {
    const n = new Date();
    document.getElementById('utc-clock').textContent =
        `UTC  ${[n.getUTCHours(), n.getUTCMinutes(), n.getUTCSeconds()]
            .map(v => String(v).padStart(2,'0')).join(':')}`;
    MARKETS.forEach(m => updateMarket(m));
}

// ═══════════════════════════════════════════════════════════════════════════════
// BOOTSTRAP
// ═══════════════════════════════════════════════════════════════════════════════

async function init() {
    // 1. Chips del watchlist
    buildChips();

    // 2. Gráfico grande (vacío, espera datos)
    initWatchlistChart();

    // 3. WebSocket — conectar en background (no bloquea)
    wsConnect();

    // 4. Cargar mini charts + suscribir WebSocket
    //    Escalonamos 400ms entre llamadas REST (rate limit: 60 req/min)
    for (const mkt of MARKETS) {
        wsSubscribe(mkt.sym);
        await loadMarketChart(mkt);
        await sleep(400);
    }

    // 5. Cargar watchlist inicial (Oro / GLD)
    const first = ASSETS.find(a => a.id === activeAssetId);
    wlActiveSym = first.sym;
    wsSubscribe(wlActiveSym);
    await loadWatchlistData(first);

    // 6. Timers de mercado (tick cada segundo)
    tick();
    setInterval(tick, 1000);
}

init();
</script>
